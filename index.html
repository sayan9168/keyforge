<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyForge Ultra — Advanced Password Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04040a; --s1: #080810; --s2: #0d0d1a;
  --border: #161628; --border2: #1f1f38;
  --a1: #e8ff47; --a2: #ff2d6b; --a3: #2de8ff; --a4: #b56cff;
  --text: #ddddf5; --muted: #44445a; --muted2: #666680;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; cursor: none; }
#cursor { position: fixed; width: 12px; height: 12px; background: var(--a1); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform 0.1s, background 0.2s, width 0.2s, height 0.2s; mix-blend-mode: difference; }
#cursor-ring { position: fixed; width: 36px; height: 36px; border: 1px solid rgba(232,255,71,0.4); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: all 0.15s ease; }
#bgCanvas { position: fixed; inset: 0; z-index: 0; opacity: 0.6; }
body::after { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1; opacity: 0.3; }
.app { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 48px 24px 100px; }
.hero { text-align: center; margin-bottom: 64px; padding-top: 20px; }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(232,255,71,0.06); border: 1px solid rgba(232,255,71,0.18); border-radius: 99px; padding: 6px 16px; font-size: 11px; font-family: var(--font-mono); letter-spacing: 3px; color: var(--a1); text-transform: uppercase; margin-bottom: 28px; opacity: 0; animation: slideDown 0.7s 0.1s cubic-bezier(.16,1,.3,1) forwards; }
.hero-badge::before { content: ''; width: 6px; height: 6px; background: var(--a1); border-radius: 50%; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.hero-title { font-family: var(--font-display); font-size: clamp(70px, 14vw, 140px); line-height: 0.9; letter-spacing: 2px; margin-bottom: 20px; opacity: 0; animation: slideDown 0.7s 0.2s cubic-bezier(.16,1,.3,1) forwards; }
.hero-title .line1 { color: var(--text); }
.hero-title .line2 { color: transparent; -webkit-text-stroke: 1px var(--a1); display: block; }
.hero-sub { font-size: 16px; color: var(--muted2); font-weight: 300; letter-spacing: 0.5px; max-width: 420px; margin: 0 auto 32px; line-height: 1.6; opacity: 0; animation: slideDown 0.7s 0.3s cubic-bezier(.16,1,.3,1) forwards; }
.hero-stats { display: flex; justify-content: center; gap: 40px; opacity: 0; animation: slideDown 0.7s 0.4s cubic-bezier(.16,1,.3,1) forwards; }
.hero-stat { text-align: center; }
.hero-stat-val { font-family: var(--font-display); font-size: 36px; color: var(--a1); letter-spacing: 1px; line-height: 1; }
.hero-stat-label { font-size: 10px; font-family: var(--font-mono); color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
.tabs-wrap { display: flex; gap: 2px; background: var(--s1); border: 1px solid var(--border); border-radius: 16px; padding: 4px; margin-bottom: 24px; opacity: 0; animation: slideDown 0.7s 0.5s cubic-bezier(.16,1,.3,1) forwards; overflow-x: auto; }
.tab-btn { flex: 1; min-width: 120px; padding: 12px 16px; background: none; border: none; border-radius: 12px; color: var(--muted2); font-family: var(--font-body); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.25s; white-space: nowrap; }
.tab-btn.active { background: var(--a1); color: #000; }
.tab-btn:not(.active):hover { color: var(--text); background: var(--border); }
.panel { background: var(--s1); border: 1px solid var(--border); border-radius: 20px; padding: 40px; opacity: 0; animation: slideDown 0.7s 0.6s cubic-bezier(.16,1,.3,1) forwards; display: none; }
.panel.active { display: block; }
</style>
